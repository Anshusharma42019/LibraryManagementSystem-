# Render deployment config
# Render will automatically run `npm start` (node src/server.js)

services:
  - type: web
    name: library-saas-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
